<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/organic-95994641-e423-4271-b7f1-7d83110eab40/styles.css">
<script src="_ds/organic-95994641-e423-4271-b7f1-7d83110eab40/_ds_bundle.js"></script>
<script src="./image-slot.js"></script>
</helmet>
<nav class="nav" style="padding-inline: max(var(--space-6), calc((100% - 1200px) / 2 + var(--space-6))); flex-wrap: wrap; row-gap: var(--space-3);">
  <a href="./Home.dc.html" style="display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:inherit;">
    <image-slot id="jomovate-icon" shape="rect" src="./assets/jomovate-icon.png" fit="contain" placeholder="Icon" style="width:32px;height:32px;flex-shrink:0;"></image-slot>
    <span style="font-family:var(--font-heading);font-weight:var(--font-heading-weight);font-size:20px;color:var(--color-text);">Jomovate</span>
  </a>
  <a href="./Home.dc.html" aria-current="{{ curHome }}">Home</a>
  <a href="./Products.dc.html" aria-current="{{ curProducts }}">Products</a>

  <a href="./Contact.dc.html" class="btn btn-primary" style="text-decoration:none;">Start a Conversation</a>
</nav>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;products&quot;,&quot;services&quot;,&quot;about&quot;,&quot;insights&quot;,&quot;contact&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active;
    const cur = (k) => (a === k ? 'page' : undefined);
    return {
      curHome: cur('home'),
      curProducts: cur('products'),
      curServices: cur('services'),
      curAbout: cur('about'),
      curInsights: cur('insights'),
    };
  }
}
</script>
</body>
</html>
